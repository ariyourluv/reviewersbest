<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading… — ReviewersBest</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0f0e0c;--paper:#f5f2eb;--paper2:#ede9df;--accent:#c8441a;--accent2:#2a5c3f;--muted:#7a7568;--border:#d4cfc4;--serif:Georgia,serif;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'Courier New',monospace}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh}
header{background:var(--ink);color:#fff;padding:0 32px}
.hdr-inner{max-width:900px;margin:0 auto;padding:18px 0;display:flex;align-items:center;gap:16px}
.logo{font-family:var(--serif);font-size:22px;font-weight:400;text-decoration:none;color:#fff}
.logo span{color:#e8856a;font-style:italic}
.back-btn{font-family:var(--mono);font-size:11px;color:#aaa;text-decoration:none;border:1px solid #444;padding:4px 12px;border-radius:2px;transition:all .12s;margin-left:auto}
.back-btn:hover{border-color:#fff;color:#fff}
main{max-width:780px;margin:0 auto;padding:40px 32px 80px}
.loading{text-align:center;padding:80px 20px;color:var(--muted)}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
#articleContent h1{font-family:var(--serif);font-size:2em;line-height:1.2;margin-bottom:0.4em}
#articleContent h2{font-size:1.35em;margin-top:2em;border-bottom:1px solid var(--border);padding-bottom:6px}
#articleContent h3{font-size:1.05em;text-transform:uppercase;letter-spacing:.6px;color:var(--accent2);margin-top:1.5em}
#articleContent p{margin-bottom:1em;line-height:1.8;font-size:15px}
#articleContent ul,#articleContent ol{margin:.5em 0 1.2em 1.4em}
#articleContent li{margin-bottom:.35em;line-height:1.7;font-size:15px}
.intro{font-size:1.05em;border-left:4px solid var(--accent);padding-left:16px;margin-bottom:1.8em;font-style:italic;color:#333;font-family:var(--serif)}
.affiliate-box{background:#fff8f0;border:1px solid #f0d4b8;border-left:5px solid var(--accent);border-radius:4px;padding:14px 18px;margin:24px 0}
.affiliate-box .aff-label{font-family:var(--mono);font-size:.7em;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.affiliate-box .aff-name{font-size:1.05em;font-weight:bold;display:block;margin-bottom:4px}
.affiliate-box p{font-size:.9em;color:#444;margin:0}
.affiliate-cta{display:inline-block;margin-top:10px;font-family:var(--mono);font-size:.8em;padding:7px 16px;background:var(--accent);color:#fff;border-radius:3px;text-decoration:none}
.meta{font-family:var(--mono);font-size:.75em;color:#888;margin-bottom:2em;padding-bottom:1em;border-bottom:1px solid var(--border)}
footer{border-top:1px solid var(--border);padding:20px 32px;text-align:center;font-size:12px;color:var(--muted);font-family:var(--mono)}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:600px){main,header,footer{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>
<header>
  <div class="hdr-inner">
    <a class="logo" href="index.html">Reviewers<span>Best</span></a>
    <a class="back-btn" href="index.html">← All articles</a>
  </div>
</header>
<main>
  <div id="articleContent">
    <div class="loading"><div class="spinner"></div><div>Loading article…</div></div>
  </div>
</main>
<footer>
  <p>© 2026 ReviewersBest &nbsp;·&nbsp; <a href="index.html">Home</a> &nbsp;·&nbsp; As an Amazon Associate we earn from qualifying purchases.</p>
</footer>
<script>
const OWNER = 'ariyourluv';
const REPO = 'reviewersbest';
const BRANCH = 'main';

async function loadArticle() {
  const params = new URLSearchParams(window.location.search);
  const file = params.get('file');
  if (!file) {
    document.getElementById('articleContent').innerHTML = '<p>No article specified. <a href="index.html">Go home</a></p>';
    return;
  }

  const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/articles/${file}`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('Article not found');
    const html = await resp.text();

    // Extract body content from the fetched HTML
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const title = doc.querySelector('title')?.textContent || 'Article';
    const bodyContent = doc.body?.innerHTML || html;

    document.title = title + ' — ReviewersBest';

    // Set meta description
    const meta = document.createElement('meta');
    meta.name = 'description';
    meta.content = title;
    document.head.appendChild(meta);

    document.getElementById('articleContent').innerHTML = bodyContent;

    // Make all affiliate links open in new tab
    document.querySelectorAll('.affiliate-cta, a[href*="amazon.com"]').forEach(a => {
      a.target = '_blank';
      a.rel = 'noopener sponsored';
    });
  } catch(e) {
    document.getElementById('articleContent').innerHTML = `<p>Could not load article: ${e.message}. <a href="index.html">Go home</a></p>`;
  }
}

loadArticle();
</script>
</body>
</html>
