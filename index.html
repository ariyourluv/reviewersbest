<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReviewersBest — Top Product Reviews & Buying Guides</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0f0e0c;--paper:#f5f2eb;--paper2:#ede9df;--accent:#c8441a;--accent2:#2a5c3f;--muted:#7a7568;--border:#d4cfc4;--serif:Georgia,serif;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'Courier New',monospace}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh}

/* Header */
header{background:var(--ink);color:#fff;padding:0 32px}
.hdr-inner{max-width:900px;margin:0 auto;padding:28px 0 24px;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
.logo{font-family:var(--serif);font-size:28px;font-weight:400;letter-spacing:-0.5px}
.logo span{color:#e8856a;font-style:italic}
.tagline{font-size:13px;color:#aaa;margin-top:4px;letter-spacing:.3px}
.hdr-tag{font-family:var(--mono);font-size:11px;background:var(--accent2);color:#b8dfc9;padding:3px 10px;border-radius:2px;letter-spacing:.5px}

/* Search */
.search-bar{background:var(--paper2);border-bottom:1px solid var(--border);padding:14px 32px}
.search-inner{max-width:900px;margin:0 auto;position:relative}
.search-inner input{width:100%;padding:9px 16px 9px 40px;border:1px solid var(--border);border-radius:4px;font-family:var(--sans);font-size:14px;background:#fff;color:var(--ink);outline:none}
.search-inner input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}

/* Main */
main{max-width:900px;margin:0 auto;padding:32px 32px 60px}

/* Stats bar */
.stats-bar{display:flex;gap:24px;margin-bottom:28px;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-val{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--accent2)}
.stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}

/* Category filters */
.filters{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.filter-btn{font-family:var(--mono);font-size:11px;padding:5px 14px;border:1px solid var(--border);border-radius:2px;background:#fff;color:var(--muted);cursor:pointer;transition:all .12s;letter-spacing:.3px}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Article grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:18px 20px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:border-color .12s,transform .12s;text-decoration:none;color:inherit}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card-type{font-family:var(--mono);font-size:9px;letter-spacing:.6px;text-transform:uppercase;padding:2px 8px;border-radius:2px;display:inline-block;width:fit-content}
.type-roundup{background:#eaf3de;color:#27500a}
.type-review{background:#e6f1fb;color:#0c447c}
.type-guide{background:#faeeda;color:#633806}
.type-comparison{background:#eeedfe;color:#3c3489}
.type-howto{background:#faece7;color:#712b13}
.type-default{background:var(--paper2);color:var(--muted)}
.card-title{font-family:var(--serif);font-size:16px;line-height:1.35;font-weight:400;color:var(--ink)}
.card-meta{display:flex;gap:12px;align-items:center;margin-top:auto}
.card-date{font-family:var(--mono);font-size:10px;color:var(--muted)}
.card-niche{font-size:11px;color:var(--muted);background:var(--paper2);padding:2px 8px;border-radius:2px}
.card-arrow{margin-left:auto;color:var(--accent);font-size:14px}

/* Loading & empty */
.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-family:var(--serif);font-size:48px;color:var(--border);margin-bottom:12px;font-style:italic}
.empty p{font-size:14px;line-height:1.7;max-width:320px;margin:0 auto}

/* Footer */
footer{border-top:1px solid var(--border);padding:20px 32px;text-align:center;font-size:12px;color:var(--muted);font-family:var(--mono)}
footer a{color:var(--accent);text-decoration:none}

/* Pagination */
.pagination{display:flex;justify-content:center;gap:8px;margin-top:32px;flex-wrap:wrap}
.page-btn{font-family:var(--mono);font-size:11px;padding:6px 14px;border:1px solid var(--border);border-radius:2px;background:#fff;color:var(--muted);cursor:pointer;transition:all .12s}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.page-btn:disabled{opacity:.4;cursor:not-allowed}

@media(max-width:600px){
  .hdr-inner{padding:20px 0 16px}
  .logo{font-size:22px}
  main,header,footer,.search-bar{padding-left:16px;padding-right:16px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <div>
      <div class="logo">Reviewers<span>Best</span></div>
      <div class="tagline">Honest reviews & buying guides powered by AI research</div>
    </div>
    <span class="hdr-tag">AMAZON AFFILIATE</span>
  </div>
</header>

<div class="search-bar">
  <div class="search-inner">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="Search articles…" oninput="filterArticles()" />
  </div>
</div>

<main>
  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="totalCount">—</div><div class="stat-lbl">Articles</div></div>
    <div class="stat"><div class="stat-val" id="nicheCount">—</div><div class="stat-lbl">Niches</div></div>
    <div class="stat"><div class="stat-val" id="lastUpdated">—</div><div class="stat-lbl">Last updated</div></div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  </div>

  <div id="articleGrid" class="grid">
    <div class="loading">
      <div class="spinner"></div>
      <div>Loading articles…</div>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>
</main>

<footer>
  <p>© 2026 ReviewersBest &nbsp;·&nbsp; <a href="https://github.com/ariyourluv/reviewersbest" target="_blank">GitHub</a> &nbsp;·&nbsp; As an Amazon Associate we earn from qualifying purchases.</p>
</footer>

<script>
const OWNER = 'ariyourluv';
const REPO = 'reviewersbest';
const BRANCH = 'main';
const PER_PAGE = 12;

let allArticles = [];
let filtered = [];
let currentFilter = 'all';
let currentPage = 1;

async function fetchArticles() {
  try {
    const resp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/articles?ref=${BRANCH}`, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });

    if (!resp.ok) {
      // Try master branch if main fails
      const resp2 = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/articles?ref=master`, {
        headers: { 'Accept': 'application/vnd.github.v3+json' }
      });
      if (!resp2.ok) throw new Error('Could not load articles folder');
      return await resp2.json();
    }
    return await resp.json();
  } catch(e) {
    return [];
  }
}

function slugToTitle(filename) {
  // Remove date prefix (YYYY-MM-DD-) and .html
  return filename
    .replace(/^\d{4}-\d{2}-\d{2}-/, '')
    .replace(/\.html$/, '')
    .replace(/-/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

function getDateFromFilename(filename) {
  const match = filename.match(/^(\d{4}-\d{2}-\d{2})/);
  return match ? match[1] : '';
}

function guessType(title) {
  const t = title.toLowerCase();
  if (t.includes('best') || t.includes('top') || t.includes('roundup')) return { label: 'Roundup', cls: 'type-roundup' };
  if (t.includes('vs') || t.includes('versus') || t.includes('comparison') || t.includes('compare')) return { label: 'Comparison', cls: 'type-comparison' };
  if (t.includes('review')) return { label: 'Review', cls: 'type-review' };
  if (t.includes('guide') || t.includes('buyer')) return { label: "Buyer's Guide", cls: 'type-guide' };
  if (t.includes('how') || t.includes('tips') || t.includes('ways')) return { label: 'How-To', cls: 'type-howto' };
  return { label: 'Article', cls: 'type-default' };
}

function guessNiche(title) {
  const t = title.toLowerCase();
  const niches = [
    ['coffee','tea','brewing','espresso','kitchen'],
    ['yoga','fitness','workout','gym','exercise','health'],
    ['tech','laptop','phone','gadget','camera','computer'],
    ['fishing','outdoor','camping','hiking','hunting'],
    ['pet','dog','cat','animal'],
    ['beauty','skincare','makeup','hair'],
    ['baby','parenting','kids','toddler'],
    ['finance','money','invest','budget','saving'],
    ['home','garden','furniture','decor','appliance'],
  ];
  const labels = ['Kitchen','Fitness','Tech','Outdoor','Pets','Beauty','Parenting','Finance','Home'];
  for (let i = 0; i < niches.length; i++) {
    if (niches[i].some(w => t.includes(w))) return labels[i];
  }
  return 'General';
}

function renderCards(articles) {
  const grid = document.getElementById('articleGrid');
  if (!articles.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">✦</div><p>No articles found. Generate some with the Autopilot tool!</p></div>`;
    return;
  }
  const start = (currentPage - 1) * PER_PAGE;
  const page = articles.slice(start, start + PER_PAGE);
  grid.innerHTML = page.map(a => {
    const type = guessType(a.title);
    const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/articles/${a.filename}`;
    const viewUrl = `article.html?file=${encodeURIComponent(a.filename)}`;
    return `<a class="card" href="${viewUrl}">
      <span class="card-type ${type.cls}">${type.label}</span>
      <div class="card-title">${a.title}</div>
      <div class="card-meta">
        <span class="card-date">${a.date}</span>
        <span class="card-niche">${a.niche}</span>
        <span class="card-arrow">→</span>
      </div>
    </a>`;
  }).join('');
}

function renderPagination(total) {
  const pages = Math.ceil(total / PER_PAGE);
  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Prev</button>`;
  for (let i = 1; i <= pages; i++) {
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="changePage(${currentPage+1})" ${currentPage===pages?'disabled':''}>Next →</button>`;
  pg.innerHTML = html;
}

function changePage(p) {
  const pages = Math.ceil(filtered.length / PER_PAGE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  renderCards(filtered);
  renderPagination(filtered.length);
  window.scrollTo(0, 0);
}

function setFilter(niche, btn) {
  currentFilter = niche;
  currentPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterArticles() {
  currentPage = 1;
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filtered = allArticles.filter(a => {
    const matchNiche = currentFilter === 'all' || a.niche === currentFilter;
    const matchSearch = !q || a.title.toLowerCase().includes(q) || a.niche.toLowerCase().includes(q);
    return matchNiche && matchSearch;
  });
  renderCards(filtered);
  renderPagination(filtered.length);
}

function buildFilters(articles) {
  const niches = [...new Set(articles.map(a => a.niche))].sort();
  const container = document.getElementById('filters');
  niches.forEach(niche => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = niche;
    btn.onclick = () => setFilter(niche, btn);
    container.appendChild(btn);
  });
}

async function init() {
  const files = await fetchArticles();

  if (!files || !files.length) {
    document.getElementById('articleGrid').innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">✦</div><p>No articles yet. Use the Autopilot tool to generate and upload your first article!</p></div>`;
    document.getElementById('totalCount').textContent = '0';
    document.getElementById('nicheCount').textContent = '0';
    document.getElementById('lastUpdated').textContent = '—';
    return;
  }

  allArticles = files
    .filter(f => f.name.endsWith('.html'))
    .map(f => ({
      filename: f.name,
      title: slugToTitle(f.name),
      date: getDateFromFilename(f.name),
      niche: guessNiche(slugToTitle(f.name)),
      url: f.download_url
    }))
    .sort((a, b) => b.date.localeCompare(a.date));

  filtered = [...allArticles];

  const niches = new Set(allArticles.map(a => a.niche));
  document.getElementById('totalCount').textContent = allArticles.length;
  document.getElementById('nicheCount').textContent = niches.size;
  document.getElementById('lastUpdated').textContent = allArticles[0]?.date || '—';

  buildFilters(allArticles);
  renderCards(filtered);
  renderPagination(filtered.length);
}

init();
</script>
</body>
</html>
