<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReviewersBest — Top Product Reviews & Buying Guides</title>
<meta name="description" content="Honest, in-depth product reviews and buying guides. Find the best products across home, fitness, tech, outdoor, and more.">
<meta name="keywords" content="product reviews, buying guides, best products, amazon reviews">
<link rel="canonical" href="https://ariyourluv.github.io/reviewersbest/">
<meta property="og:type" content="website">
<meta property="og:title" content="ReviewersBest — Top Product Reviews & Buying Guides">
<meta property="og:description" content="Honest, in-depth product reviews and buying guides.">
<meta property="og:url" content="https://ariyourluv.github.io/reviewersbest/">
<meta name="twitter:card" content="summary">
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebSite","name":"ReviewersBest","url":"https://ariyourluv.github.io/reviewersbest/","description":"Honest product reviews and buying guides"}</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0f0e0c;--paper:#f5f2eb;--paper2:#ede9df;--accent:#c8441a;--accent2:#2a5c3f;--muted:#7a7568;--border:#d4cfc4;--serif:Georgia,serif;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'Courier New',monospace}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh}
header{background:var(--ink);color:#fff;padding:0 32px}
.hdr-inner{max-width:900px;margin:0 auto;padding:28px 0 24px;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
.logo{font-family:var(--serif);font-size:28px;font-weight:400;letter-spacing:-0.5px}
.logo span{color:#e8856a;font-style:italic}
.tagline{font-size:13px;color:#aaa;margin-top:4px;letter-spacing:.3px}
.hdr-tag{font-family:var(--mono);font-size:11px;background:var(--accent2);color:#b8dfc9;padding:3px 10px;border-radius:2px;letter-spacing:.5px}
.search-bar{background:var(--paper2);border-bottom:1px solid var(--border);padding:14px 32px}
.search-inner{max-width:900px;margin:0 auto;position:relative}
.search-inner input{width:100%;padding:9px 16px 9px 40px;border:1px solid var(--border);border-radius:4px;font-family:var(--sans);font-size:14px;background:#fff;color:var(--ink);outline:none}
.search-inner input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
main{max-width:900px;margin:0 auto;padding:32px 32px 60px}
.stats-bar{display:flex;gap:24px;margin-bottom:28px;flex-wrap:wrap}
.stat-val{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--accent2)}
.stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.filters{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.filter-btn{font-family:var(--mono);font-size:11px;padding:5px 14px;border:1px solid var(--border);border-radius:2px;background:#fff;color:var(--muted);cursor:pointer;transition:all .12s}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:18px 20px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:border-color .12s,transform .12s;text-decoration:none;color:inherit}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card-type{font-family:var(--mono);font-size:9px;letter-spacing:.6px;text-transform:uppercase;padding:2px 8px;border-radius:2px;display:inline-block;width:fit-content}
.type-roundup{background:#eaf3de;color:#27500a}
.type-review{background:#e6f1fb;color:#0c447c}
.type-guide{background:#faeeda;color:#633806}
.type-comparison{background:#eeedfe;color:#3c3489}
.type-howto{background:#faece7;color:#712b13}
.type-default{background:var(--paper2);color:var(--muted)}
.card-title{font-family:var(--serif);font-size:16px;line-height:1.35;font-weight:400;color:var(--ink)}
.card-meta{display:flex;gap:12px;align-items:center;margin-top:auto}
.card-date{font-family:var(--mono);font-size:10px;color:var(--muted)}
.card-niche{font-size:11px;color:var(--muted);background:var(--paper2);padding:2px 8px;border-radius:2px}
.card-arrow{margin-left:auto;color:var(--accent);font-size:14px}
.state-box{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fcebeb;border:1px solid #f7c1c1;border-radius:6px;padding:16px 20px;margin-bottom:20px;font-size:13px;color:#791f1f;font-family:var(--mono);display:none}
.pagination{display:flex;justify-content:center;gap:8px;margin-top:32px;flex-wrap:wrap}
.page-btn{font-family:var(--mono);font-size:11px;padding:6px 14px;border:1px solid var(--border);border-radius:2px;background:#fff;color:var(--muted);cursor:pointer}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
footer{border-top:1px solid var(--border);padding:20px 32px;text-align:center;font-size:12px;color:var(--muted);font-family:var(--mono)}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:600px){.hdr-inner{padding:20px 0 16px}.logo{font-size:22px}main,header,footer,.search-bar{padding-left:16px;padding-right:16px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="hdr-inner">
    <div>
      <div class="logo">Reviewers<span>Best</span></div>
      <div class="tagline">Honest reviews & buying guides powered by AI research</div>
    </div>
    <span class="hdr-tag">AMAZON AFFILIATE</span>
  </div>
</header>
<div class="search-bar">
  <div class="search-inner">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="Search articles..." oninput="filterArticles()" />
  </div>
</div>
<main>
  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="totalCount">—</div><div class="stat-lbl">Articles</div></div>
    <div class="stat"><div class="stat-val" id="nicheCount">—</div><div class="stat-lbl">Niches</div></div>
    <div class="stat"><div class="stat-val" id="lastUpdated">—</div><div class="stat-lbl">Last updated</div></div>
  </div>
  <div class="error-box" id="errorBox"></div>
  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  </div>
  <div id="articleGrid" class="grid">
    <div class="state-box"><div class="spinner"></div><div>Loading articles...</div></div>
  </div>
  <div class="pagination" id="pagination"></div>
  <div style="margin-top:24px;text-align:center">
    <button onclick="downloadSitemap()" style="font-family:var(--mono);font-size:11px;padding:6px 16px;border:1px solid var(--border);border-radius:2px;background:#fff;color:var(--muted);cursor:pointer">Download sitemap.xml</button>
  </div>
</main>
<footer>
  <p>&#169; 2026 ReviewersBest &nbsp;&middot;&nbsp; <a href="https://github.com/ariyourluv/reviewersbest" target="_blank">GitHub</a> &nbsp;&middot;&nbsp; As an Amazon Associate we earn from qualifying purchases.</p>
</footer>
<script>
const OWNER = 'ariyourluv';
const REPO = 'reviewersbest';
const PER_PAGE = 12;
let allArticles = [], filtered = [], currentFilter = 'all', currentPage = 1;

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.style.display = 'block';
  el.textContent = 'Error: ' + msg;
}

async function fetchArticles() {
  // Try main branch first, then master
  const branches = ['main', 'master'];
  for (const branch of branches) {
    try {
      const url = 'https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/articles?ref=' + branch;
      const resp = await fetch(url, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
      if (resp.ok) {
        const data = await resp.json();
        if (Array.isArray(data)) return data;
      }
      // Show the actual error
      const errData = await resp.json().catch(() => ({}));
      console.log('Branch ' + branch + ' failed:', resp.status, errData.message);
    } catch(e) {
      console.log('Fetch error on branch ' + branch + ':', e.message);
    }
  }
  return null;
}

function slugToTitle(filename) {
  return filename.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace(/\.html$/, '').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function getDate(filename) {
  const m = filename.match(/^(\d{4}-\d{2}-\d{2})/);
  return m ? m[1] : '';
}

function guessType(title) {
  const t = title.toLowerCase();
  if (t.includes('vs') || t.includes('versus') || t.includes('comparison')) return { label: 'Comparison', cls: 'type-comparison' };
  if (t.includes('best') || t.includes('top') || t.includes('roundup')) return { label: 'Roundup', cls: 'type-roundup' };
  if (t.includes('review')) return { label: 'Review', cls: 'type-review' };
  if (t.includes('guide') || t.includes('buyer')) return { label: "Buyer's Guide", cls: 'type-guide' };
  if (t.includes('how') || t.includes('tips') || t.includes('ways')) return { label: 'How-To', cls: 'type-howto' };
  return { label: 'Article', cls: 'type-default' };
}

function guessNiche(title) {
  const t = title.toLowerCase();
  const map = [
    [['coffee','tea','brew','espresso','kitchen','cook','food','recipe'],'Kitchen'],
    [['yoga','fitness','workout','gym','exercise','health','weight'],'Fitness'],
    [['laptop','phone','gadget','camera','computer','tech','iphone','android','tablet'],'Tech'],
    [['fishing','camping','hiking','hunting','outdoor','trail','backpack'],'Outdoor'],
    [['pet','dog','cat','puppy','kitten','animal'],'Pets'],
    [['beauty','skincare','makeup','hair','moistur','serum'],'Beauty'],
    [['baby','parenting','kids','toddler','stroller','diaper'],'Parenting'],
    [['finance','money','invest','budget','saving','income'],'Finance'],
    [['home','garden','furniture','decor','appliance','mattress','pillow'],'Home'],
  ];
  for (const [words, label] of map) {
    if (words.some(w => t.includes(w))) return label;
  }
  return 'General';
}

function renderCards(articles) {
  const grid = document.getElementById('articleGrid');
  if (!articles.length) {
    grid.innerHTML = '<div class="state-box"><div style="font-size:48px;color:var(--border);margin-bottom:12px">&#10022;</div><p>No articles found.</p></div>';
    return;
  }
  const start = (currentPage - 1) * PER_PAGE;
  const page = articles.slice(start, start + PER_PAGE);
  grid.innerHTML = page.map(a => {
    const type = guessType(a.title);
    const viewUrl = 'article.html?file=' + encodeURIComponent(a.filename);
    return '<a class="card" href="' + viewUrl + '">' +
      '<span class="card-type ' + type.cls + '">' + type.label + '</span>' +
      '<div class="card-title">' + a.title + '</div>' +
      '<div class="card-meta">' +
        '<span class="card-date">' + a.date + '</span>' +
        '<span class="card-niche">' + a.niche + '</span>' +
        '<span class="card-arrow">&#8594;</span>' +
      '</div></a>';
  }).join('');
}

function renderPagination(total) {
  const pages = Math.ceil(total / PER_PAGE);
  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.innerHTML = ''; return; }
  let html = '<button class="page-btn" onclick="changePage(' + (currentPage-1) + ')" ' + (currentPage===1?'disabled':'') + '>&larr; Prev</button>';
  for (let i = 1; i <= pages; i++) {
    html += '<button class="page-btn ' + (i===currentPage?'active':'') + '" onclick="changePage(' + i + ')">' + i + '</button>';
  }
  html += '<button class="page-btn" onclick="changePage(' + (currentPage+1) + ')" ' + (currentPage===pages?'disabled':'') + '>Next &rarr;</button>';
  pg.innerHTML = html;
}

function changePage(p) {
  const pages = Math.ceil(filtered.length / PER_PAGE);
  if (p < 1 || p > pages) return;
  currentPage = p;
  renderCards(filtered);
  renderPagination(filtered.length);
  window.scrollTo(0, 0);
}

function setFilter(niche, btn) {
  currentFilter = niche;
  currentPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterArticles() { currentPage = 1; applyFilters(); }

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filtered = allArticles.filter(a => {
    const matchNiche = currentFilter === 'all' || a.niche === currentFilter;
    const matchSearch = !q || a.title.toLowerCase().includes(q) || a.niche.toLowerCase().includes(q);
    return matchNiche && matchSearch;
  });
  renderCards(filtered);
  renderPagination(filtered.length);
}

function buildFilters(articles) {
  const niches = [...new Set(articles.map(a => a.niche))].sort();
  const container = document.getElementById('filters');
  niches.forEach(niche => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = niche;
    btn.onclick = function() { setFilter(niche, btn); };
    container.appendChild(btn);
  });
}

function downloadSitemap() {
  const siteUrl = 'https://ariyourluv.github.io/reviewersbest';
  const urls = allArticles.map(a =>
    '  <url>\n    <loc>' + siteUrl + '/articles/' + a.filename + '</loc>\n    <lastmod>' + a.date + '</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.8</priority>\n  </url>'
  ).join('\n');
  const xml = '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n  <url>\n    <loc>' + siteUrl + '/index.html</loc>\n    <changefreq>daily</changefreq>\n    <priority>1.0</priority>\n  </url>\n' + urls + '\n</urlset>';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([xml], {type:'application/xml'}));
  a.download = 'sitemap.xml';
  a.click();
}

async function init() {
  const files = await fetchArticles();

  if (files === null) {
    document.getElementById('articleGrid').innerHTML = '<div class="state-box"><p>Could not load articles. Make sure the <strong>articles/</strong> folder exists in your GitHub repo and it is public.</p></div>';
    showError('Could not reach GitHub API. Check browser console (F12) for details.');
    document.getElementById('totalCount').textContent = '0';
    document.getElementById('nicheCount').textContent = '0';
    document.getElementById('lastUpdated').textContent = '—';
    return;
  }

  if (!files.length) {
    document.getElementById('articleGrid').innerHTML = '<div class="state-box"><p>No articles yet! Generate some with the Autopilot tool.</p></div>';
    document.getElementById('totalCount').textContent = '0';
    document.getElementById('nicheCount').textContent = '0';
    document.getElementById('lastUpdated').textContent = '—';
    return;
  }

  allArticles = files
    .filter(f => f.name && f.name.endsWith('.html'))
    .map(f => ({
      filename: f.name,
      title: slugToTitle(f.name),
      date: getDate(f.name),
      niche: guessNiche(slugToTitle(f.name))
    }))
    .sort((a, b) => b.date.localeCompare(a.date));

  filtered = [...allArticles];
  const niches = new Set(allArticles.map(a => a.niche));
  document.getElementById('totalCount').textContent = allArticles.length;
  document.getElementById('nicheCount').textContent = niches.size;
  document.getElementById('lastUpdated').textContent = allArticles[0] ? allArticles[0].date : '—';
  buildFilters(allArticles);
  renderCards(filtered);
  renderPagination(filtered.length);
}

init();
</script>
</body>
</html>
